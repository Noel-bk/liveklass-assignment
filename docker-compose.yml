services:
  mysql:
    image: mysql:8.4
    container_name: liveklass-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: liveklass
      MYSQL_USER: liveklass
      MYSQL_PASSWORD: liveklass

    ports:
      - "3306:3306"

    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: